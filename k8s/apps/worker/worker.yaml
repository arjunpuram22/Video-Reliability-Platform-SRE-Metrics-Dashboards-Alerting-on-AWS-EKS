apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: app
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: 907759099913.dkr.ecr.us-east-1.amazonaws.com/video-worker:1.0
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: app
  labels:
    app: worker-service
spec:
  selector:
    app: worker-service
  ports:
    - name: metrics
      port: 8001
      targetPort: 8001
  type: ClusterIP
